<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-title">Better MS XDR</div>

    <div class="popup-row-header">General</div>
    <div class="popup-row">
      <span class="popup-label" data-tooltip="Enable or disable all extension features">Extension Enabled</span>
      <label class="popup-toggle">
        <input type="checkbox" id="enabledToggle">
        <span class="popup-toggle-slider"></span>
      </label>
    </div>

    <div class="popup-row">
      <span class="popup-label" data-tooltip="Toggle the XDR portal between light and dark themes">Dark Mode</span>
      <label class="popup-toggle">
        <input type="checkbox" id="themeToggle">
        <span class="popup-toggle-slider"></span>
      </label>
    </div>

    <div class="popup-row-header">Incidents</div>
    <div class="popup-row">
      <span class="popup-label" data-tooltip="Show or hide the incidents page header">Show Header</span>
      <label class="popup-toggle">
        <input type="checkbox" id="headerToggle">
        <span class="popup-toggle-slider"></span>
      </label>
    </div>

    <div class="popup-row">
      <span class="popup-label" data-tooltip="Reduce row height to fit more incidents on screen">Compact Mode</span>
      <label class="popup-toggle">
        <input type="checkbox" id="compactToggle">
        <span class="popup-toggle-slider"></span>
      </label>
    </div>

    <div class="popup-row">
      <span class="popup-label" data-tooltip="Reduce opacity of resolved incidents so they visually recede">Dim Resolved</span>
      <label class="popup-toggle">
        <input type="checkbox" id="dimResolvedToggle">
        <span class="popup-toggle-slider"></span>
      </label>
    </div>

    <div class="popup-footer">
      <span class="popup-footer-version" id="versionLabel"></span>
      <a class="popup-footer-github" href="https://github.com/h0ffayyy/better-ms-xdr-extension" target="_blank" rel="noopener noreferrer" title="GitHub">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
